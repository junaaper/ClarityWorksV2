name: Simplification Checks

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  simplify-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install ML service dependencies
        working-directory: ml-service
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m spacy download en_core_web_sm

      - name: Run simplification consistency checks
        working-directory: ml-service
        run: python test_simplification_consistency.py

      - name: Run simplification golden checks
        working-directory: ml-service
        run: python test_simplification_golden.py

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Type-check frontend
        working-directory: frontend
        run: npx tsc --noEmit
